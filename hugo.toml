[params.cover]
  linkFullImages   = true
  responsiveImages = false

[params.label]
  text = "RockB"

[params.giscus]
  repo       = "baeseokjae/baeseokjae.github.io"
  repoId     = "R_kgDOR9sp5w"
  category   = "General"
  categoryId = "DIC_kwDOR9sp584C6chE"

