baseURL = 'https://baeseokjae.github.io/'
languageCode = 'en-us'
title = 'RockB'
theme = 'PaperMod'

[pagination]
  pagerSize = 10

[params]
  env            = 'production'
  description    = 'Honest reviews, comparisons, and guides on AI tools actually worth your time.'
  author         = 'baeseokjae'
  images         = ['/images/og-default.png']

  ShowReadingTime     = true
  ShowShareButtons    = true
  ShowPostNavLinks    = true
  ShowBreadCrumbs     = true
  ShowCodeCopyButtons = true
  ShowToc             = true
  ShowFullTextinRSS   = true
