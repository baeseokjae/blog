    {
      "@type": "Question",
      "name": "What is Peta and what problem does it solve for AI agents?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Peta is an MCP control plane that prevents raw API key exposure in AI agent systems. It intercepts tool calls, enforces least-privilege policies, and injects short-lived scoped credentials at runtime — so agents never see the underlying secrets. It solves the structural problem where 93% of AI agent projects use overprivileged, unrevocable API keys with no per-agent identity."
      }
    },
    {
      "@type": "Question",
      "name": "How does Peta differ from just using environment variables for API keys?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Environment variables store static, long-lived credentials that agents can read and potentially leak into logs, model outputs, or memory. Peta's gateway never exposes credentials to the agent at all — it intercepts the MCP tool call, injects the credential on the outbound side, and returns only the tool's response. The agent cannot extract the key even if it tries."
      }
    },
    {
      "@type": "Question",
      "name": "Does Peta require changes to my agent's code?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Minimal changes. The primary integration point is your MCP client configuration — you redirect tool server endpoints to Peta's gateway and add your agent ID and org ID as headers. The agent runtime itself doesn't need to import any Peta SDK or change how it makes tool calls. Peta is transparent at the MCP protocol level."
      }
    },
    {
      "@type": "Question",
      "name": "What happens if Peta's gateway goes down? Do my agents stop working?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Peta's gateway is in the critical path for every tool call that runs through it, so availability is a core concern. Peta runs its gateway as a high-availability service, but you should evaluate their SLA commitments against your reliability requirements. For locally hosted or highly sensitive deployments, Peta also offers self-hosted gateway options."
      }
    },
    {
      "@type": "Question",
      "name": "How does Peta handle multi-tenant scenarios where multiple users' agents share infrastructure?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Peta's vault and policy engine are designed for multi-tenancy from the ground up. Each organization (tenant) has isolated credential storage; policies can include attribute conditions that bind a specific tool call to the authenticated end user's identity, preventing one user's agent from accessing another user's data even if they share the same agent class."
      }
    }
  ]
