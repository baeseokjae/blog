      "name": "What is the difference between Claude Code hooks and CLAUDE.md instructions?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "CLAUDE.md is a text file that Claude reads as part of its context — it informs the model's behavior but is interpreted by the LLM, not enforced by the system. Hooks in `settings.json` are deterministic shell commands that run unconditionally at lifecycle events. Hooks cannot be forgotten, ignored, or misinterpreted. Use CLAUDE.md for project context and preferences; use hooks for policies that must never fail."

        "text": "Exit code 2 hard-blocks the tool call and surfaces an error message to the developer. The action never executes. Exit code 0 allows execution to proceed. Any other exit code logs a warning but does not block. To permanently block a pattern, use `exit 2` in a `PreToolUse` hook targeting the relevant tools."
