      "name": "What is context engineering for AI coding agents?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Context engineering is the practice of deliberately designing what information an AI coding agent sees during a session — including system prompts, retrieved files, tool outputs, and memory — to maximize the probability of correct, consistent behavior. It goes beyond prompt writing to treat the entire token ecosystem as an architecture problem."
      }
    },
    {
      "@type": "Question",
      "name": "How is context engineering different from prompt engineering?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Prompt engineering optimizes a single input message. Context engineering manages the entire information flow across a multi-turn, multi-tool agentic session — including which files are loaded, when information is retrieved, how history is compressed, and how state is persisted externally. In 2026, most real-world agent failures are context engineering failures, not prompt failures."
      }
    },
    {
      "@type": "Question",
      "name": "What is the 'lost-in-the-middle' problem and how does it affect coding agents?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The lost-in-the-middle phenomenon describes how LLMs reliably recall information at the beginning and end of a context window better than information in the middle. For coding agents, this means constraints buried in the middle of a long system prompt or conversation history are silently ignored. The fix is to position critical rules at the beginning of context and use compression to keep total context length manageable."
      }
    },
    {
      "@type": "Question",
      "name": "What is a good KV cache hit rate target for AI coding agents?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Target 70%+ KV cache hit rate. Achieving this requires keeping system prompts and tool definitions stable across requests and placing all dynamic content (conversation history, task context) at the end of the prompt. At 70%+ hit rate, teams typically see 50%+ cost reduction and 40%+ latency reduction on cached portions."
      }
    },
    {
      "@type": "Question",
      "name": "Should I use CLAUDE.md, AGENTS.md, or .cursorrules?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use the format native to your primary tool: CLAUDE.md for Claude Code, AGENTS.md for OpenAI and multi-model frameworks, .cursorrules for Cursor. If you use multiple tools, maintain separate files for each — they serve the same architectural role but load differently. All three should stay under 150-200 instructions to remain within reliable model attention limits."
      }
    }
