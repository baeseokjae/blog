      "acceptedAnswer": {

        "text": "Agentic AI testing uses autonomous agents that plan, generate, execute, and repair tests with minimal human input across the full test lifecycle. AI-augmented testing adds AI features (selector suggestions, test step autocomplete, flaky test detection) to traditional frameworks like Selenium or Cypress. In practice, agentic tools require no scripting for new feature coverage; augmented tools require engineers to write most of the test code with AI assistance."

      "name": "How does self-healing in AI QA tools actually work?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Self-healing approaches fall into three categories. Selector-fallback tools try alternative selectors (ID → class → XPath) when the primary fails. Longitudinal ML tools (Testim) record a vector of element properties and match against it at runtime. Intent-based tools (Testsigma, Mabl) store the semantic goal of a test step and resolve the correct element from application context at runtime. Intent-based healing is the most robust for significantly restructured UIs."
