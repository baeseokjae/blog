      "name": "What is ACP and how does it differ from MCP?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "ACP (Agent Client Protocol) is a standard for connecting AI agents to editors — it defines how an agent can read files, make edits, and understand codebase context via the IDE. MCP (Model Context Protocol) is Anthropic's standard for connecting LLMs to external data sources and tools. They operate at different layers: MCP provides context to models, ACP provides agent capabilities to editors. They can work together."
