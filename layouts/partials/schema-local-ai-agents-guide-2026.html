      "acceptedAnswer": {
        "@type": "Answer",
        "text": "In Cline settings, disable 'Auto-approve terminal commands' and enable 'Require approval for all shell executions.' Cline will show you each command before running it and wait for your approval. For fully automated pipelines, consider sandboxing with Docker: run your agent inside a container with limited filesystem access and no network egress. LangGraph's interrupt-before-action pattern also works well for command approval in programmatic pipelines."

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "16 GB RAM is the practical minimum for running a 7B model locally while VS Code and other dev tools are open. 32 GB RAM lets you run 13B–24B models without memory pressure. With 64 GB RAM you can run 70B models on CPU (slowly) or large context windows on 24B models. RAM matters most when the model exceeds VRAM and Ollama needs to page between VRAM and system RAM — in that case, fast RAM (DDR5 or Apple unified memory) meaningfully improves inference speed."
