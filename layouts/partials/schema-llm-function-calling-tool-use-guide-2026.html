      "name": "Does function calling work with all models or just the most expensive ones?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "All major paid-tier models from OpenAI (GPT-4.1, GPT-4o mini), Anthropic (Claude Haiku, Claude Sonnet, Claude Opus), and Google (Gemini 1.5 Flash, Gemini 2.5 Pro) support function calling. Smaller/cheaper models like GPT-4o mini and Claude Haiku support it well for simple single-tool use cases. For complex multi-step agent loops with many tools, frontier models are significantly more reliable at choosing the right tools and arguments."

      "@type": "Question",
      "name": "Can I use function calling with streaming responses?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, with caveats. OpenAI and Anthropic both support streaming with function calls—tool call arguments stream as tokens, letting you start processing before the argument JSON is complete. Google Gemini 2.5+ streams function call arguments natively. You must buffer the argument stream and parse the complete JSON before executing—streaming doesn't help with execution latency, only with time-to-first-token."
      }
    },
    {
      "@type": "Question",
      "name": "How do I prevent the model from calling tools it shouldn't?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use tool_choice (OpenAI), tool_choice with {\"type\": \"none\"} (Anthropic), or remove the tool from the tools array entirely. Removing tools from the request is the most reliable approach for session-level restrictions because it's enforced by the API rather than relying on model compliance. For operation-level restrictions, implement authorization checks in your execution layer—never trust the model to enforce permissions."
      }
    },
    {
      "@type": "Question",
      "name": "What's the maximum number of tools I can include in a request?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "OpenAI supports up to 128 tools per request. Anthropic supports a similar number. Google Gemini's limit varies by model generation. In practice, stay well below these limits: more than 20–30 tools significantly increases token costs and the likelihood of the model choosing the wrong tool. If you need more, use tool routing—a classifier that selects a relevant subset of tools for each request."
      }
    },
    {
      "@type": "Question",
      "name": "How do I handle functions that take a long time to execute?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use async execution with explicit timeouts. Set a per-tool timeout (typically 10–30 seconds) and a total agent loop timeout (60–120 seconds). When a timeout occurs, return a timeout error string as the tool result—don't let the exception propagate. The model can then decide to retry, use a different approach, or report the failure to the user. For genuinely long operations, return a job ID immediately and provide a separate check_job_status tool the model can poll."
