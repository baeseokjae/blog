      "name": "Is Claude Code free to use?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Claude Code requires either a Claude.ai Pro or Max subscription (which includes Claude Code access) or a direct Anthropic API key. There is no free tier. Pro costs $20/month as of 2026; Max costs $100/month with higher rate limits. API key billing is pay-per-token with no monthly minimum."
      }

      "@type": "Question",
      "name": "Does Claude Code work offline or with local models?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "No. Claude Code sends all inference requests to Anthropic's servers. It does not support local LLM backends (Ollama, LM Studio, etc.) as of April 2026. An internet connection and valid API credentials are required for every session."
      }
    },
    {
      "@type": "Question",
      "name": "How is CLAUDE.md different from a .cursorrules file?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Both serve as context documents for their respective tools, but CLAUDE.md is richer in scope: it covers shell commands, architecture decisions, memory pointers, and skill definitions, not just coding style rules. CLAUDE.md is also read recursively \u2014 subdirectory CLAUDE.md files add module-specific context on top of the root file, which .cursorrules does not support."
      }
    },
    {
      "@type": "Question",
      "name": "Can multiple developers share Claude Code configuration?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. Commit CLAUDE.md, `.claude/settings.json`, and `.claude/skills/` to version control. Each developer installs Claude Code locally, but they all benefit from the shared context and skills. Personal preferences (API key, preferred model) stay in `~/.claude/` which is not committed."
      }
    },
    {
      "@type": "Question",
      "name": "How do I stop Claude Code from making changes automatically without approval?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use `/plan` to enter Plan Mode, which makes Claude Code describe its intended changes and wait for your approval before executing. You can also configure hooks to require confirmation before any Write or Edit tool call. For highly sensitive codebases, run Claude Code with `--permission-mode read-only` to allow reads but block all file modifications and shell commands until you explicitly approve each one."
      }
    }
