      "acceptedAnswer": {
        "@type": "Answer",
        "text": "With runtime injection via the SDK, rotation is transparent: update the credential value in your 1Password vault, and the next secrets.resolve() call returns the new value. There is no restart or redeployment required unless the agent caches credentials. The recommendation is never to cache credentials in agent memory; resolve them immediately before each use to ensure you always get the current value."

      "acceptedAnswer": {
        "@type": "Answer",
