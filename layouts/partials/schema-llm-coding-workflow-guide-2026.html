      "name": "What is spec-driven development in the context of LLM coding workflows?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Spec-driven development is the practice of writing an explicit requirements and design specification — covering goals, constraints, invariants, and acceptance criteria — before asking an LLM to generate any code. The spec gives the model a ground truth to reason against, reducing hallucinated implementation paths and mid-task direction changes. In practice, this means maintaining a spec.md or per-feature task file that the agent loads at session start."
      }

      "acceptedAnswer": {
        "@type": "Answer",
        "text": "MCP (Model Context Protocol) servers are connections that give an AI agent live access to external systems — databases, issue trackers, design tools, monitoring platforms. Instead of manually pasting database schemas or ticket descriptions, the agent queries them directly. In 2026, start with the MCP server for your database (Postgres or SQLite) and your issue tracker (Linear or GitHub Issues) — these eliminate the two most common context gaps that cause LLM coding errors."
      }

      "@type": "Question",
      "name": "What is AI-on-AI code review?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "AI-on-AI code review is the practice of using a second, fresh LLM context to review the code generated by a first context. The reviewing context loads only the diff and your project conventions — it has no attachment to the implementation decisions made during generation. This catches logical errors and security issues that the generating agent rationalized away, and that quick human review often misses. Teams using this pattern report catching ~30% more bugs before PR."
      }
    },

      "name": "How do I know when to use autonomous agents vs. supervised implementation loops?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use autonomous agents for well-defined, low-risk tasks with clear specs and strong test coverage — test generation, documentation, and isolated refactors. Use supervised loops (review output at each step) for anything touching databases, security-sensitive code, ambiguous requirements, or large files. A practical heuristic: if you'd require a senior engineer to review a human implementation, use a supervised loop for the AI equivalent. The blast radius of a mistake is the deciding factor."
