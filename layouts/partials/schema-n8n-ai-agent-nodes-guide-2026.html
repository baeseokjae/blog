        "text": "Set max_steps in your context package and reference it in the system prompt: 'Stop after a maximum of {max_steps} tool calls.' Also configure the agent node's built-in 'Max Iterations' setting in the node configuration panel — this is a hard stop that fires before n8n's execution timeout."

    {
      "@type": "Question",
      "name": "What is the difference between an n8n AI Agent node and a regular LLM node?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "A regular LLM node sends one prompt and returns one response — no tool use, no looping, no memory by default. An AI Agent node wraps the LLM with a reasoning loop: it can call tools, inspect results, and continue reasoning across multiple LLM calls within a single workflow execution. Use the regular LLM node for simple generation tasks; use the Agent node when the workflow needs to decide what to do based on dynamic inputs."
      }

    {
      "@type": "Question",
      "name": "How do I share context between multiple AI Agent nodes in a chain?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Use a Set node between agents to extract the fields you need from the first agent's output and map them into the second agent's input. For session context, store the context_package in a global variable using n8n's $vars or pass it explicitly through the chain using Set nodes. Avoid using the same Memory sub-node instance across multiple agents — it creates shared state that can cause agents to confuse their own conversation history with inputs from a sibling agent."
