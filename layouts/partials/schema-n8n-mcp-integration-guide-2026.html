      "acceptedAnswer": {
        "@type": "Answer",
        "text": "n8n 1.68 or later includes the MCP Server Trigger and MCP Client Tool nodes. If you're on an older version, update first. Check your version at Settings → About in the n8n UI."
      }

    {
      "@type": "Question",
      "name": "Can I use n8n Cloud instead of self-hosted for MCP?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. n8n Cloud instances have a public HTTPS URL out of the box, which is required for MCP Server Trigger nodes to be reachable from Claude Desktop or other external MCP clients. Self-hosted instances need a public URL with TLS — typically achieved via a reverse proxy."
      }
    },
    {
      "@type": "Question",
      "name": "What's the difference between the czlonkowski/n8n-mcp package and the native MCP nodes?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "The native MCP nodes (MCP Server Trigger and MCP Client Tool) let you invoke existing n8n workflows from external AI clients and let n8n workflows call external MCP servers. The czlonkowski/n8n-mcp package does something different: it gives Claude knowledge of n8n's node library so Claude can build and deploy new n8n workflows via the n8n API, without you using the visual editor. They solve different problems and can be used together."
      }
    },
    {
      "@type": "Question",
      "name": "Is n8n MCP integration secure enough for production use?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, with proper configuration. Use Bearer Token or OAuth2 authentication on all MCP Server Trigger nodes, put n8n behind a reverse proxy, validate all AI-provided inputs in the workflow, and monitor the execution log. Don't rely solely on the MCP authentication layer — treat incoming tool parameters as untrusted user input."
      }
    },
    {
      "@type": "Question",
      "name": "How does n8n MCP pricing compare to Zapier for AI agent workflows?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "n8n charges per workflow execution regardless of how many nodes run in that execution. Zapier charges per task (each node = one task). An AI agent workflow that runs 10 nodes per invocation costs 1 execution in n8n vs. 10 tasks in Zapier. At scale, n8n typically delivers 40–60% cost savings. For high-frequency AI agent workflows, the pricing difference compounds quickly."
      }
