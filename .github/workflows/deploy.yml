name: Deploy Hugo

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 2

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Check for new posts
        id: check_posts
        run: |
          NEW_POSTS=$(git diff HEAD~1 HEAD --name-only --diff-filter=A | grep '^content/posts/.*\.md$' || true)
          if [ -n "$NEW_POSTS" ]; then
            echo "has_new_posts=true" >> $GITHUB_OUTPUT
            # 첫 번째 새 포스트 제목 추출
            FIRST_POST=$(echo "$NEW_POSTS" | head -1)
            TITLE=$(grep '^title:' "$FIRST_POST" | head -1 | sed 's/title: *//;s/^"//;s/"$//')
            COUNT=$(echo "$NEW_POSTS" | wc -l | tr -d ' ')
            echo "title=$TITLE" >> $GITHUB_OUTPUT
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "has_new_posts=false" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        if: steps.check_posts.outputs.has_new_posts == 'true'
        run: |
          COUNT=${{ steps.check_posts.outputs.count }}
          TITLE="${{ steps.check_posts.outputs.title }}"
          if [ "$COUNT" -gt 1 ]; then
            MSG="📝 *$COUNT new posts published*%0A$TITLE (and $((COUNT-1)) more)%0A%0A🔗 https://baeseokjae.github.io/"
          else
            MSG="📝 *New post published*%0A$TITLE%0A%0A🔗 https://baeseokjae.github.io/"
          fi
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MSG" \
            -d "parse_mode=Markdown"
